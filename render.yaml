services:
  - type: web
    name: vika-web
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: vika-db
          property: connectionString
      - key: DATABASE_SSL
        value: "false"
      - key: YOOKASSA_SHOP_ID
        sync: false
      - key: YOOKASSA_SECRET_KEY
        sync: false
      - key: YOOKASSA_RETURN_URL
        sync: false

databases:
  - name: vika-db
    plan: free
    databaseName: vika
    ipAllowList: []
